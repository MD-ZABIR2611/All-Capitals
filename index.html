    <!-- CONTROLS BAR -->
    <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-xl border border-orange-200/50 p-5 md:p-6 mb-6 transition-all">
      
      <!-- Stats Row -->
      <div class="flex flex-wrap justify-between items-center gap-3 mb-5">

            <span class="font-black text-orange-600 text-2xl mr-1" id="totalCount">197</span>

          </div>
          <button id="favFilterBtn" class="bg-gray-100 rounded-full px-5 py-2 cursor-pointer hover:bg-orange-100 transition-all">
            <span id="favCount" class="text-gray-700">⭐ 0 favorites</span>
          </button>
          <div class="bg-gray-100 rounded-full px-5 py-2">
            <span id="clickCounter" class="text-gray-700">📖 0 clicks</span>
          </div>
        </div>
        <div class="text-xs text-gray-500 bg-gray-100/80 px-4 py-1.5 rounded-full" id="clock">🕒 --:--:--</div>
      </div>

      <!-- Search + Controls -->
      <div class="flex flex-col md:flex-row gap-4">
        <div class="relative flex-1">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by country or capital..." 
                 class="w-full bg-white border-2 border-gray-200 focus:border-orange-400 rounded-2xl py-3 pl-11 pr-12 text-gray-800 font-medium outline-none transition-all">
          <button id="clearSearch" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 text-xl font-bold hidden transition-all">✖</button>
        </div>
        
        <div class="flex gap-2 flex-wrap">
          <button id="gridView" class="px-5 py-2.5 rounded-full font-bold transition-all bg-orange-500 text-white shadow-md">📱 Grid</button>
          <button id="listView" class="px-5 py-2.5 rounded-full font-bold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300">📋 List</button>
          <button id="darkModeBtn" class="px-5 py-2.5 rounded-full font-bold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300">🌙 Dark</button>
          <button id="exportBtn" class="px-5 py-2.5 rounded-full font-bold transition-all bg-green-500 text-white hover:bg-green-600 shadow-md">📎 Export CSV</button>
        </div>
      </div>
    </div>

    <!-- COUNTRY GRID / LIST CONTAINER -->
    <div id="countriesContainer" class="transition-all duration-300">
      <div class="text-center py-20 text-gray-500 text-lg">📚 Loading 197 countries...</div>
    </div>

    <!-- FLOATING RANDOM BUTTON -->
    <button id="randomBtn" class="fixed bottom-6 right-6 bg-gradient-to-r from-orange-500 to-amber-600 text-white rounded-full p-4 shadow-2xl hover:scale-110 transition-all duration-300 z-40 text-2xl shadow-orange-500/30">🎲</button>

    <!-- FOOTER -->

      <div class="text-xs text-gray-500">✨ Click ★ to favorite | Click 📖 for Wikipedia | All data saved in your browser ✨</div>
    </div>
  </div>

      { country: "United Arab Emirates", capital: "Abu Dhabi" }, { country: "United Kingdom", capital: "London" }, { country: "United States", capital: "Washington, D.C." },
      { country: "Uruguay", capital: "Montevideo" }, { country: "Uzbekistan", capital: "Tashkent" }, { country: "Vanuatu", capital: "Port Vila" },
      { country: "Vatican City", capital: "Vatican City" }, { country: "Venezuela", capital: "Caracas" }, { country: "Vietnam", capital: "Hanoi" },
      { country: "Yemen", capital: "Sana'a" }, { country: "Zambia", capital: "Lusaka" }, { country: "Zimbabwe", capital: "Harare" }
    ];

    // Helper functions
    function getWikipediaUrl(country) {
      const specialCases = {
        "United States": "United_States",
        "United Kingdom": "United_Kingdom", 
        "Côte d'Ivoire": "Ivory_Coast",
        "North Korea": "North_Korea",
        "South Korea": "South_Korea",
        "Bosnia and Herzegovina": "Bosnia_and_Herzegovina"
      };
      const formatted = specialCases[country] || country.replace(/ /g, '_');
      return `https://en.wikipedia.org/wiki/${encodeURIComponent(formatted)}`;
    }

    function getFlagEmoji(country) {
      const flagMap = {
        "United States": "🇺🇸", "United Kingdom": "🇬🇧", "Canada": "🇨🇦", "Australia": "🇦🇺",
        "India": "🇮🇳", "China": "🇨🇳", "Japan": "🇯🇵", "Germany": "🇩🇪", "France": "🇫🇷",
        "Brazil": "🇧🇷", "Mexico": "🇲🇽", "Bangladesh": "🇧🇩", "Pakistan": "🇵🇰", "Vietnam": "🇻🇳",
        "Russia": "🇷🇺", "Italy": "🇮🇹", "Spain": "🇪🇸", "Egypt": "🇪🇬", "Nigeria": "🇳🇬",
        "Turkey": "🇹🇷", "South Korea": "🇰🇷", "Indonesia": "🇮🇩", "Netherlands": "🇳🇱",
        "Sweden": "🇸🇪", "Norway": "🇳🇴", "Denmark": "🇩🇰", "Finland": "🇫🇮", "Poland": "🇵🇱"
      };
      return flagMap[country] || "🌍";
    }

    // App State
    let favorites = new Set(JSON.parse(localStorage.getItem('capitalium_favorites') || '[]'));
    let clickCounts = JSON.parse(localStorage.getItem('capitalium_clicks') || '{}');
    let searchTerm = '';
    let currentView = 'grid';
    let showFavoritesOnly = false;

    // DOM Elements
    const container = document.getElementById('countriesContainer');
    const totalSpan = document.getElementById('totalCount');
    const favCountSpan = document.getElementById('favCount');
    const clickCounterSpan = document.getElementById('clickCounter');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');
    const gridBtn = document.getElementById('gridView');
    const listBtn = document.getElementById('listView');
    const darkBtn = document.getElementById('darkModeBtn');
    const exportBtn = document.getElementById('exportBtn');
    const randomBtn = document.getElementById('randomBtn');
    const favFilterBtn = document.getElementById('favFilterBtn');
    const toastDiv = document.getElementById('toast');
    const toastMsgSpan = document.getElementById('toastMsg');

    function showToast(message, isError = false) {
      toastMsgSpan.textContent = message;
      toastDiv.classList.remove('translate-x-[150%]');
      toastDiv.classList.add('translate-x-0');
      if (isError) toastDiv.classList.add('bg-red-600');
      else toastDiv.classList.remove('bg-red-600');
      setTimeout(() => {
        toastDiv.classList.add('translate-x-[150%]');
        toastDiv.classList.remove('translate-x-0');
      }, 2000);
    }

    function updateStats() {
      const totalClicks = Object.values(clickCounts).reduce((sum, val) => sum + val, 0);
      clickCounterSpan.innerHTML = `📖 ${totalClicks} clicks`;
      favCountSpan.innerHTML = `⭐ ${favorites.size} favorites`;
    }

    function getFilteredCountries() {
      let filtered = [...allCountries];
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(c => 
          c.country.toLowerCase().includes(term) || 
          c.capital.toLowerCase().includes(term)
        );
      }
      if (showFavoritesOnly) {
        filtered = filtered.filter(c => favorites.has(c.country));
      }
      return filtered;
    }

    function render() {
      const filtered = getFilteredCountries();
      totalSpan.textContent = filtered.length;
      updateStats();

      if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-gray-500 text-lg">✨ No countries match your search ✨</div>`;
        return;
      }

      container.className = currentView === 'grid'
        ? 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5'
        : 'flex flex-col gap-3';

      container.innerHTML = '';

      filtered.forEach(item => {
        const isFavorite = favorites.has(item.country);
        const visitCount = clickCounts[item.country] || 0;
        
        const card = document.createElement('div');
        card.className = `bg-white border-2 border-gray-200 hover:border-orange-400 rounded-2xl p-4 shadow-md hover:shadow-xl transition-all duration-200 group ${currentView === 'list' ? 'flex justify-between items-center' : ''}`;
        
        if (currentView === 'grid') {
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div class="flex-1">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="text-2xl">${getFlagEmoji(item.country)}</span>
                  <span class="font-extrabold text-gray-800 group-hover:text-orange-600 transition">${item.country}</span>
                </div>
                <div class="mt-2 flex items-center gap-2 flex-wrap">
                  <span class="text-sm font-semibold text-gray-500">🏛️ ${item.capital}</span>
                  ${visitCount > 0 ? `<span class="text-xs text-gray-400">📚 ${visitCount}</span>` : ''}
                  ${visitCount > 3 ? '<span class="text-xs text-orange-500">🔥</span>' : ''}
                </div>
              </div>
              <div class="flex gap-2">
                <button class="fav-star text-2xl ${isFavorite ? 'text-yellow-500' : 'text-gray-400'} hover:scale-125 transition-transform" data-country="${item.country}">${isFavorite ? '★' : '☆'}</button>
                <button class="wiki-link text-2xl text-blue-500 hover:scale-110 transition-transform" data-country="${item.country}">📖</button>
              </div>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="flex justify-between items-center w-full">
              <div class="flex items-center gap-3 flex-wrap">
                <span class="text-2xl">${getFlagEmoji(item.country)}</span>
                <div>
                  <span class="font-extrabold text-gray-800">${item.country}</span>
                  <span class="text-sm text-gray-500 ml-2">🏛️ ${item.capital}</span>
                  ${visitCount > 0 ? `<span class="text-xs text-gray-400 ml-2">📚 ${visitCount}</span>` : ''}
                  ${visitCount > 3 ? '<span class="text-xs text-orange-500 ml-1">🔥</span>' : ''}
                </div>
              </div>
              <div class="flex gap-3">
                <button class="fav-star text-xl ${isFavorite ? 'text-yellow-500' : 'text-gray-400'} hover:scale-125 transition-transform" data-country="${item.country}">${isFavorite ? '★' : '☆'}</button>
                <button class="wiki-link text-xl text-blue-500 hover:scale-110 transition-transform" data-country="${item.country}">📖</button>
              </div>
            </div>
          `;
        }
        
        container.appendChild(card);
      });

      // Attach event listeners to dynamically created buttons
      document.querySelectorAll('.fav-star').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const country = btn.getAttribute('data-country');
          if (favorites.has(country)) {
            favorites.delete(country);
            showToast(`💔 Removed ${country} from favorites`);
          } else {
            favorites.add(country);
            showToast(`⭐ Added ${country} to favorites`);
          }
          localStorage.setItem('capitalium_favorites', JSON.stringify([...favorites]));
          render();
        };
      });

      document.querySelectorAll('.wiki-link').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const country = btn.getAttribute('data-country');
          clickCounts[country] = (clickCounts[country] || 0) + 1;
          localStorage.setItem('capitalium_clicks', JSON.stringify(clickCounts));
          window.open(getWikipediaUrl(country), '_blank');
          showToast(`📖 Opening Wikipedia: ${country}`);
          render();
        };
      });
    }

    // Dark Mode Functionality
    function initDarkMode() {
      const isDark = localStorage.getItem('capitalium_dark') === 'true';
      if (isDark) {
        document.body.classList.add('dark');
        darkBtn.textContent = '☀️ Light';
        darkBtn.classList.remove('bg-gray-200', 'text-gray-700');
        darkBtn.classList.add('bg-orange-500', 'text-white');
      } else {
        darkBtn.textContent = '🌙 Dark';
        darkBtn.classList.remove('bg-orange-500', 'text-white');
        darkBtn.classList.add('bg-gray-200', 'text-gray-700');
      }
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('capitalium_dark', isDark);
      if (isDark) {
        darkBtn.textContent = '☀️ Light';
        darkBtn.classList.remove('bg-gray-200', 'text-gray-700');
        darkBtn.classList.add('bg-orange-500', 'text-white');
        showToast('🌙 Dark mode enabled');
      } else {
        darkBtn.textContent = '🌙 Dark';
        darkBtn.classList.remove('bg-orange-500', 'text-white');
        darkBtn.classList.add('bg-gray-200', 'text-gray-700');
        showToast('☀️ Light mode enabled');
      }
    }

    // Event Listeners
    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value;
      clearBtn.classList.toggle('hidden', searchTerm === '');
      render();
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      searchTerm = '';
      clearBtn.classList.add('hidden');
      render();
      showToast('Search cleared');
    });

    gridBtn.addEventListener('click', () => {
      currentView = 'grid';
      gridBtn.className = 'px-5 py-2.5 rounded-full font-bold transition-all bg-orange-500 text-white shadow-md';
      listBtn.className = 'px-5 py-2.5 rounded-full font-bold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300';
      render();
      showToast('Grid view');
    });

    listBtn.addEventListener('click', () => {
      currentView = 'list';
      listBtn.className = 'px-5 py-2.5 rounded-full font-bold transition-all bg-orange-500 text-white shadow-md';
      gridBtn.className = 'px-5 py-2.5 rounded-full font-bold transition-all bg-gray-200 text-gray-700 hover:bg-gray-300';
      render();
      showToast('List view');
    });

    darkBtn.addEventListener('click', toggleDarkMode);

    favFilterBtn.addEventListener('click', () => {
      showFavoritesOnly = !showFavoritesOnly;
      if (showFavoritesOnly) {
        favFilterBtn.classList.add('bg-orange-200');
        showToast('⭐ Showing only favorites');
      } else {
        favFilterBtn.classList.remove('bg-orange-200');
        showToast('🌍 Showing all countries');
      }
      render();
    });

    exportBtn.addEventListener('click', () => {
      let csvContent = "Country,Capital,Favorite,Wikipedia Clicks\n";
      allCountries.forEach(c => {
        csvContent += `"${c.country}","${c.capital}",${favorites.has(c.country) ? "Yes" : "No"},${clickCounts[c.country] || 0}\n`;
      });
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.setAttribute('download', `capitalium_export_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast(`📎 Exported ${allCountries.length} countries to CSV`);
    });

    randomBtn.addEventListener('click', () => {
      const randomCountry = allCountries[Math.floor(Math.random() * allCountries.length)];
      showToast(`🎲 Random: ${randomCountry.country} → ${randomCountry.capital}`);
    });

    // Live Clock
    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('clock').innerHTML = `🕒 ${timeString}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
        showToast('🔍 Type to search...');
      }
      if (e.key === 'Escape' && searchTerm) {
        clearBtn.click();
      }
      if (e.key === 'g' || e.key === 'G') gridBtn.click();
      if (e.key === 'l' || e.key === 'L') listBtn.click();
      if (e.key === 'd' || e.key === 'D') darkBtn.click();
      if (e.key === 'f' || e.key === 'F') favFilterBtn.click();
    });

    // Initialize
    initDarkMode();
    render();
    showToast('✨ Welcome to CAPITALIUM! Click ★ to save favorites ✨');
  </script>
</body>
</html>
