<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🌍 CAPITALIUM | World Capitals Wikipedia Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-gray-100 to-blue-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 transition-all duration-300">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10">
    
    <!-- HERO SECTION -->
    <div class="text-center mb-8 md:mb-12">
      <div class="inline-block mb-4">
        <span class="bg-gradient-to-r from-orange-500 to-amber-600 text-white text-xs md:text-sm font-extrabold px-5 py-2 rounded-full shadow-lg shadow-orange-500/30">🌐 197 SOVEREIGN STATES 🌐</span>
      </div>
      <h1 class="text-4xl md:text-6xl font-black bg-gradient-to-r from-slate-800 via-orange-600 to-amber-700 bg-clip-text text-transparent dark:from-white dark:via-orange-400 dark:to-amber-300">🌍 CAPITALIUM</h1>
      <p class="text-gray-600 dark:text-gray-300 text-base md:text-lg font-medium mt-3">⚡ Click any country → Wikipedia | ⭐ Favorites | 🔍 Search ⚡</p>
    </div>

    <!-- CONTROLS BAR -->
    <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-xl border border-orange-200/40 dark:border-orange-800/30 p-5 md:p-6 mb-6">
      
      <!-- Stats Row -->
      <div class="flex flex-wrap justify-between items-center gap-3 mb-5">
        <div class="flex gap-3 flex-wrap">
          <div class="bg-orange-50 dark:bg-orange-950/60 rounded-full px-5 py-2 shadow-sm">
            <span class="font-black text-orange-600 dark:text-orange-400 text-2xl mr-1" id="totalCount">197</span>
            <span class="font-semibold text-gray-700 dark:text-gray-300">countries</span>
          </div>
          <div class="bg-gray-100 dark:bg-slate-700 rounded-full px-5 py-2 cursor-pointer hover:bg-orange-100 dark:hover:bg-orange-900/50 transition" id="favFilterBtn">
            <span class="text-gray-600 dark:text-gray-300 text-sm" id="favCount">⭐ 0 favorites</span>
          </div>
          <div class="bg-gray-100 dark:bg-slate-700 rounded-full px-5 py-2">
            <span class="text-gray-600 dark:text-gray-300 text-sm" id="visitedCount">📖 Click counter</span>
          </div>
        </div>
        <div class="text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-slate-700 px-4 py-1.5 rounded-full" id="clock">🕒 --:--:--</div>
      </div>

      <!-- Search Row -->
      <div class="flex flex-col md:flex-row gap-4">
        <div class="relative flex-1">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
          <input type="text" id="searchInput" placeholder="Search country or capital..." 
                 class="w-full bg-white dark:bg-slate-800 border-2 border-gray-200 dark:border-slate-700 focus:border-orange-400 dark:focus:border-orange-500 rounded-2xl py-3 pl-11 pr-12 text-gray-800 dark:text-white font-medium outline-none transition">
          <button id="clearSearch" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 text-xl font-bold hidden">✖</button>
        </div>
        
        <div class="flex gap-2 flex-wrap">
          <button id="gridView" class="px-5 py-2.5 rounded-full font-bold transition-all duration-200 bg-orange-500 text-white shadow-md">📱 Grid</button>
          <button id="listView" class="px-5 py-2.5 rounded-full font-bold transition-all duration-200 bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-slate-600">📋 List</button>
          <button id="darkModeBtn" class="px-5 py-2.5 rounded-full font-bold transition-all duration-200 bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-slate-600">🌙 Dark</button>
          <button id="exportBtn" class="px-5 py-2.5 rounded-full font-bold transition-all duration-200 bg-green-500 text-white hover:bg-green-600 shadow-md">📎 Export CSV</button>
        </div>
      </div>
    </div>

    <!-- COUNTRY CONTAINER -->
    <div id="countriesContainer" class="transition-all duration-300">
      <div class="text-center py-20 text-gray-500 dark:text-gray-400 text-lg">Loading 197 countries...</div>
    </div>

    <!-- RANDOM BUTTON -->
    <button id="randomBtn" class="fixed bottom-6 right-6 bg-gradient-to-r from-orange-500 to-amber-600 text-white rounded-full p-4 shadow-2xl hover:scale-110 transition-all duration-300 z-40 text-2xl">🎲</button>

    <!-- FOOTER -->
    <div class="mt-14 pt-6 border-t border-gray-200 dark:border-slate-700 text-center">
      <div class="text-xs text-gray-500 dark:text-gray-400">✨ Click ★ to favorite | Click 📖 for Wikipedia | Data persists in your browser ✨</div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-24 right-6 bg-gray-900 dark:bg-orange-600 text-white px-5 py-2.5 rounded-full shadow-2xl text-sm font-semibold translate-x-[150%] transition-all duration-300 z-50">📘 Toast</div>

  <script src="index.js"></script>
</body>
</html>
